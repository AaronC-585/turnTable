name: Update CurrentVersion

on:
  # Primary path: `.github/workflows/compile.yml` publishes the release and commits CurrentVersion.json on main.
  # Use this workflow only to re-sync the manifest from an existing release (manual repair or tag override).
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to sync (optional, defaults to latest release)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  sync-current-version:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve release metadata
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG:-${EVENT_TAG:-}}"
          if [ -n "$TAG" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" > /tmp/release.json
          else
            gh api "repos/${GITHUB_REPOSITORY}/releases/latest" > /tmp/release.json
          fi
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          import re

          release = json.loads(Path("/tmp/release.json").read_text(encoding="utf-8"))
          tag_name = release.get("tag_name", "").strip()
          if not tag_name:
              raise SystemExit("Missing release tag_name")
          version = tag_name[1:] if tag_name.startswith("v") else tag_name

          assets = {}
          android_by_abi = {}
          abi_pattern = re.compile(r"(arm64-v8a|armeabi-v7a|x86_64|x86)", re.IGNORECASE)
          for a in sorted(release.get("assets", []), key=lambda x: x.get("name", "")):
              name = (a.get("name") or "").strip()
              url = (a.get("browser_download_url") or "").strip()
              if name and url:
                  assets[name] = url
                  m = abi_pattern.search(name)
                  if name.lower().endswith(".apk") and m:
                      android_by_abi[m.group(1).lower()] = url

          # Backward-compatible shortcut used by existing app code.
          fallback_apk = (
              android_by_abi.get("arm64-v8a")
              or android_by_abi.get("armeabi-v7a")
              or android_by_abi.get("x86_64")
              or android_by_abi.get("x86")
              or next((u for n, u in assets.items() if n.lower().endswith(".apk")), "")
          )
          if fallback_apk:
              assets["apk"] = fallback_apk
          if android_by_abi:
              assets["androidByAbi"] = android_by_abi

          ios_zip = next(
              (
                  u
                  for n, u in assets.items()
                  if n.lower().endswith(".zip") and "turntable-ios" in n.lower()
              ),
              "",
          )
          if ios_zip:
              assets["iosZip"] = ios_zip

          repo = os.environ.get("GITHUB_REPOSITORY", "")
          release_page = f"https://github.com/{repo}/releases/latest" if repo else ""

          payload = {
              "version": version,
              "currentTag": tag_name,
              "releasePageUrl": release_page,
              "assets": assets,
          }
          Path("CurrentVersion.json").write_text(
              json.dumps(payload, indent=4) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Commit and push when changed
        run: |
          set -euo pipefail
          if git diff --quiet -- CurrentVersion.json; then
            echo "CurrentVersion.json already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CurrentVersion.json
          git commit -m "chore: sync CurrentVersion.json from release assets"
          git push

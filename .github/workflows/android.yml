name: compiler

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"

jobs:
  build-android-per-abi:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86, x86_64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Build release APK for ABI
        run: |
          cd android
          ./gradlew :app:assembleRelease :app:printAppVersion -PABI_FILTERS=${{ matrix.abi }}

      - name: Prepare ABI artifact names
        run: |
          APK_PATH="$(ls android/app/build/outputs/apk/release/turnTable.release-*.apk | head -n1)"
          if [ -z "$APK_PATH" ]; then
            echo "No APK produced"
            exit 1
          fi
          BASE="$(basename "$APK_PATH" .apk)"
          ABI_APK="android/app/build/outputs/apk/release/${BASE}-${{ matrix.abi }}.apk"
          cp "$APK_PATH" "$ABI_APK"
          cp CurrentVersion.json "android/app/build/outputs/apk/release/CurrentVersion-${{ matrix.abi }}.json"

      - name: Upload ABI APK + CurrentVersion manifest
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: |
            android/app/build/outputs/apk/release/turnTable.release-*-${{ matrix.abi }}.apk
            android/app/build/outputs/apk/release/CurrentVersion-${{ matrix.abi }}.json

name: Android

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"

jobs:
  build-android-universal:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify local Node 24 action
        uses: ./.github/actions/node24-marker

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK / NDK license
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses and install required NDK
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "ndk;28.0.12433566"

      # One APK with all JNI ABIs (matches former matrix coverage).
      - name: Build universal release APK
        run: |
          cd android
          ./gradlew :app:assembleRelease :app:printAppVersion \
            -PABI_FILTERS=armeabi-v7a,arm64-v8a,x86,x86_64 \
            -Dorg.gradle.java.home="${JAVA_HOME}"

      - name: Stage manifest for artifact (manual-release / tooling)
        run: |
          APK_PATH="$(ls android/app/build/outputs/apk/release/turnTable.release-*.apk | head -n1)"
          if [ -z "$APK_PATH" ]; then
            echo "No APK produced"
            exit 1
          fi
          cp CurrentVersion.json android/app/build/outputs/apk/release/CurrentVersion-universal.json

      - name: Upload universal APK + CurrentVersion manifest
        uses: actions/upload-artifact@v4
        with:
          name: android-universal
          path: |
            android/app/build/outputs/apk/release/turnTable.release-*.apk
            android/app/build/outputs/apk/release/CurrentVersion-universal.json

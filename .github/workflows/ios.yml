name: iOS Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - "android/**"
      - "cpp/**"
      - "Makefile"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "ios/**"
      - "android/**"
      - "cpp/**"
      - "Makefile"
      - ".github/workflows/ios.yml"
jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify local Node 24 action
        uses: ./.github/actions/node24-marker

      - name: Ensure CMake
        run: |
          cmake --version || brew install cmake
          cmake --version

      - name: Build native iOS library
        run: make ios

      - name: Resolve Android-synced version for iOS
        run: |
          ANDROID_VERSION="$(python3 -c 'import json; print(json.load(open("CurrentVersion.json","r",encoding="utf-8")).get("version","").strip())')"
          if [ -z "$ANDROID_VERSION" ]; then
            echo "Failed to read Android version from CurrentVersion.json"
            exit 1
          fi
          IFS='.' read -r V1 V2 V3 V4 <<< "$ANDROID_VERSION"
          IOS_MARKETING_VERSION="${V1:-0}.${V2:-0}.${V3:-0}"
          IOS_BUILD_VERSION="${V4:-${GITHUB_RUN_NUMBER}}"
          echo "ANDROID_VERSION=$ANDROID_VERSION" >> "$GITHUB_ENV"
          echo "IOS_MARKETING_VERSION=$IOS_MARKETING_VERSION" >> "$GITHUB_ENV"
          echo "IOS_BUILD_VERSION=$IOS_BUILD_VERSION" >> "$GITHUB_ENV"
          echo "PKG_NAME=turnTable-ios-${ANDROID_VERSION}.zip" >> "$GITHUB_ENV"

      - name: Build iOS app (simulator)
        run: |
          xcodebuild \
            -project ios/turnTable.xcodeproj \
            -scheme turnTable \
            -configuration Release \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath ios/build/DerivedData \
            MARKETING_VERSION="${IOS_MARKETING_VERSION}" \
            CURRENT_PROJECT_VERSION="${IOS_BUILD_VERSION}" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package simulator app
        run: |
          APP_PATH="$(ls -d ios/build/DerivedData/Build/Products/Release-iphonesimulator/*.app | head -n1)"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "ios/build/${PKG_NAME}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: turnTable-ios-${{ env.ANDROID_VERSION }}
          path: |
            ios/build/${{ env.PKG_NAME }}
            ios/build/Release-iphoneos/libbarcode_scanner_core.a
            ios/build/Release-iphonesimulator/libbarcode_scanner_core.a

name: Build

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
    build-ios:
        runs-on: macos-latest
        steps:
          - uses: actions/checkout@v4
    
          - name: Get version
            id: version
            run: |
              if [ "${{ github.event_name }}" = "release" ]; then
                echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
              else
                echo "tag=v$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"
              fi
    
          - uses: actions/setup-node@v4
            with:
              node-version: 24
              cache: npm
    
          - run: npm ci
    
          - name: Generate native project
            run: npx expo prebuild --platform ios --clean
    
          - name: Install CocoaPods dependencies
            working-directory: ios
            run: pod install
    
          - name: Build .app
            working-directory: ios
            run: xcodebuild -workspace turnTable.xcworkspace -scheme turnTable -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO
    
          - name: Archive .app
            run: cd ios/build/Build/Products/Release-iphoneos && zip -r "$GITHUB_WORKSPACE/turnTable-${{ steps.version.outputs.tag }}.app.zip" turnTable.app
    
          - name: Upload .app
            uses: actions/upload-artifact@v4
            with:
              name: turnTable-${{ steps.version.outputs.tag }}.app
              path: turnTable-${{ steps.version.outputs.tag }}.app.zip
    
          - name: Attach .app to release
            if: github.event_name == 'release'
            env:
              GH_TOKEN: ${{ github.token }}
            run: gh release upload "${{ github.event.release.tag_name }}" "turnTable-${{ steps.version.outputs.tag }}.app.zip"

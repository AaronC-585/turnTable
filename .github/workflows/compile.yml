name: Compiler

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - "android/**"
      - "cpp/**"
      - "Makefile"
      - "package.json"
      - ".github/workflows/compile.yml"
  pull_request:
    paths:
      - "ios/**"
      - "android/**"
      - "cpp/**"
      - "Makefile"
      - "package.json"
      - ".github/workflows/compile.yml"
jobs:
  # One release APK per 64-bit ABI: AArch64 phones (arm64-v8a) vs x86_64 emulators / x64 ChromeOS.
  build-android-release-abi:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, x86_64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify local Node 24 action
        uses: ./.github/actions/node24-marker

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          #cache: gradle

      - name: Set up Android SDK / NDK license
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses and install required NDK
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "ndk;28.0.12433566"

      - name: Build release APK (${{ matrix.abi }})
        run: npx --yes npm run build:android -- -PABI_FILTERS=${{ matrix.abi }}

      # turnTable.<abi>.release-<abi>.apk (e.g. turnTable.arm64-v8a.apk)
      - name: Rename APK with architecture label
        run: |
          set -euo pipefail
          ABI="${{ matrix.abi }}"
          APK="$(ls android/app/build/outputs/apk/release/turnTable.*.apk | head -n1)"
          if [ -z "$APK" ]; then
            echo "No APK produced"
            exit 1
          fi
          DEST="android/app/build/outputs/apk/release/turnTable.${ABI}.apk"
          mv "$APK" "$DEST"
          echo "Renamed to $DEST"

      - name: Stage manifest for artifact (manual-release / tooling)
        run: |
          ABI="${{ matrix.abi }}"
          APK_PATH="android/app/build/outputs/apk/release/turnTable.${ABI}.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "No APK produced after rename: $APK_PATH"
            exit 1
          fi
          cp CurrentVersion.json "android/app/build/outputs/apk/release/CurrentVersion-${{ matrix.abi }}.json"

      - name: Upload release APK + CurrentVersion manifest
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ matrix.abi }}
          path: |
            android/app/build/outputs/apk/release/turnTable.${{ matrix.abi }}.apk
            android/app/build/outputs/apk/release/CurrentVersion-${{ matrix.abi }}.json

  build-ios:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify local Node 24 action
        uses: ./.github/actions/node24-marker

      - name: Ensure CMake
        run: |
          cmake --version || brew install cmake
          cmake --version

      - name: Build native iOS library
        run: make ios

      - name: Resolve Android-synced version for iOS
        run: |
          ANDROID_VERSION="$(python3 -c 'import json; print(json.load(open("CurrentVersion.json","r",encoding="utf-8")).get("version","").strip())')"
          if [ -z "$ANDROID_VERSION" ]; then
            echo "Failed to read Android version from CurrentVersion.json"
            exit 1
          fi
          IFS='.' read -r V1 V2 V3 V4 <<< "$ANDROID_VERSION"
          IOS_MARKETING_VERSION="${V1:-0}.${V2:-0}.${V3:-0}"
          IOS_BUILD_VERSION="${V4:-${GITHUB_RUN_NUMBER}}"
          echo "ANDROID_VERSION=$ANDROID_VERSION" >> "$GITHUB_ENV"
          echo "IOS_MARKETING_VERSION=$IOS_MARKETING_VERSION" >> "$GITHUB_ENV"
          echo "IOS_BUILD_VERSION=$IOS_BUILD_VERSION" >> "$GITHUB_ENV"
          echo "PKG_NAME=turnTable-ios-${ANDROID_VERSION}.zip" >> "$GITHUB_ENV"

      - name: Build iOS app (simulator)
        run: |
          xcodebuild \
            -project ios/turnTable.xcodeproj \
            -scheme turnTable \
            -configuration Release \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath ios/build/DerivedData \
            MARKETING_VERSION="${IOS_MARKETING_VERSION}" \
            CURRENT_PROJECT_VERSION="${IOS_BUILD_VERSION}" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package simulator app
        run: |
          APP_PATH="$(ls -d ios/build/DerivedData/Build/Products/Release-iphonesimulator/*.app | head -n1)"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "ios/build/${PKG_NAME}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: turnTable-ios-${{ env.ANDROID_VERSION }}
          path: |
            ios/build/${{ env.PKG_NAME }}
            ios/build/Release-iphoneos/libbarcode_scanner_core.a
            ios/build/Release-iphonesimulator/libbarcode_scanner_core.a

  # Main / manual only: publish APKs and commit CurrentVersion.json (paths filter avoids loops on doc-only pushes).
  github-release:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: [build-android-release-abi]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.publish.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Android release APKs + manifests
        uses: actions/download-artifact@v4
        with:
          pattern: android-release-*
          merge-multiple: true
          path: rel-assets

      # Do not run Gradle here: no Android SDK on this runner, and versionName is time-based at
      # configure time so it would not match the matrix-built APKs. Use CurrentVersion-*.json from the build.
      - name: Resolve app versionName from build artifacts
        id: ver
        run: |
          set -euo pipefail
          JSON="$(find rel-assets -type f -name 'CurrentVersion-*.json' | head -n1)"
          if [ -z "$JSON" ]; then
            echo "No CurrentVersion-*.json found under rel-assets"
            find rel-assets -type f -maxdepth 3 || true
            exit 1
          fi
          APP_VERSION="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1],encoding="utf-8"))["version"].strip())' "$JSON")"
          if [ -z "$APP_VERSION" ]; then
            echo "Empty version in $JSON"
            exit 1
          fi
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved versionName=$APP_VERSION (from $JSON)"

      - name: Create or update GitHub Release
        id: publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v${{ steps.ver.outputs.app_version }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          mapfile -t APKs < <(find rel-assets -type f -name '*.apk' | sort)
          if [ "${#APKs[@]}" -eq 0 ]; then
            echo "No APK files under rel-assets"
            exit 1
          fi
          if gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
            gh release upload "$TAG" "${APKs[@]}" --clobber --repo "${{ github.repository }}"
          else
            gh release create "$TAG" "${APKs[@]}" \
              --repo "${{ github.repository }}" \
              --title "turnTable ${{ steps.ver.outputs.app_version }}" \
              --generate-notes \
              --latest
          fi

  sync-current-version-json:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: [github-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Rebuild CurrentVersion.json from release assets
        env:
          GH_TOKEN: ${{ github.token }}
          SYNC_TAG: ${{ needs.github-release.outputs.release_tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${SYNC_TAG}" > /tmp/release.json
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          import re

          release = json.loads(Path("/tmp/release.json").read_text(encoding="utf-8"))
          tag_name = release.get("tag_name", "").strip()
          if not tag_name:
              raise SystemExit("Missing release tag_name")
          version = tag_name[1:] if tag_name.startswith("v") else tag_name

          assets = {}
          android_by_abi = {}
          abi_pattern = re.compile(r"(arm64-v8a|x86_64)", re.IGNORECASE)
          for a in sorted(release.get("assets", []), key=lambda x: x.get("name", "")):
              name = (a.get("name") or "").strip()
              url = (a.get("browser_download_url") or "").strip()
              if name and url:
                  assets[name] = url
                  m = abi_pattern.search(name)
                  if name.lower().endswith(".apk") and m:
                      android_by_abi[m.group(1).lower()] = url

          fallback_apk = (
              android_by_abi.get("arm64-v8a")
              or android_by_abi.get("x86_64")
              or next((u for n, u in assets.items() if n.lower().endswith(".apk")), "")
          )
          if fallback_apk:
              assets["apk"] = fallback_apk
          if android_by_abi:
              assets["androidByAbi"] = android_by_abi

          repo = os.environ.get("GITHUB_REPOSITORY", "")
          release_page = f"https://github.com/{repo}/releases/latest" if repo else ""

          payload = {
              "version": version,
              "currentTag": tag_name,
              "releasePageUrl": release_page,
              "assets": assets,
          }
          Path("CurrentVersion.json").write_text(
              json.dumps(payload, indent=4) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Commit and push when changed
        env:
          SYNC_TAG: ${{ needs.github-release.outputs.release_tag }}
        run: |
          set -euo pipefail
          if git diff --quiet -- CurrentVersion.json; then
            echo "CurrentVersion.json already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CurrentVersion.json
          git commit -m "chore: sync CurrentVersion.json from CI release ${SYNC_TAG}"
          git push

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1D Barcode Scanner</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a1a;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }
    h1 { font-size: 1.25rem; margin: 0 0 0.5rem; font-weight: 600; }
    .scanner-wrap {
      position: relative;
      width: 100%;
      max-width: 640px;
      aspect-ratio: 4/3;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
    }
    #interactive.viewport {
      width: 100% !important;
      height: 100% !important;
    }
    #interactive.viewport canvas, #interactive.viewport video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
    }
    .result {
      margin-top: 1rem;
      padding: 1rem 1.25rem;
      background: #2a2a2a;
      border-radius: 8px;
      width: 100%;
      max-width: 640px;
      min-height: 3rem;
      font-size: 1.1rem;
      word-break: break-all;
    }
    .result.empty { color: #666; }
    .result .label { color: #888; font-size: 0.85rem; margin-bottom: 0.25rem; }
    .result .value { font-weight: 500; }
    .status { color: #888; font-size: 0.8rem; margin-top: 0.5rem; }
    .status.error { color: #e66; }
    .status.ok { color: #6a6; }
    button {
      margin-top: 1rem;
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      background: #3a7bd5;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #2d6ac4; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>1D Barcode Scanner</h1>
  <p class="status" id="status">Requesting camera…</p>
  <div class="scanner-wrap">
    <div id="interactive" class="viewport"></div>
  </div>
  <div class="result empty" id="result">
    <span class="label">Last scan</span>
    <span class="value" id="value">—</span>
  </div>
  <button type="button" id="toggle">Stop scanner</button>

  <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.12.1/dist/quagga.min.js"></script>
  <script>
    const viewport = document.getElementById('interactive');
    const resultEl = document.getElementById('result');
    const valueEl = document.getElementById('value');
    const statusEl = document.getElementById('status');
    const toggleBtn = document.getElementById('toggle');

    let running = false;
    let lastCode = '';

    function setStatus(msg, isError) {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (isError ? ' error' : ' ok');
    }

    function onDetected(data) {
      const code = data?.codeResult?.code;
      if (!code || code === lastCode) return;
      lastCode = code;
      const format = data?.codeResult?.format?.formatName || '1D';
      valueEl.textContent = code;
      resultEl.classList.remove('empty');
      setStatus('Scanned: ' + format, false);
    }

    function startScanner() {
      if (running) return;
      lastCode = '';
      Quagga.init({
        inputStream: {
          name: 'Live',
          type: 'LiveStream',
          target: viewport,
          constraints: { facingMode: 'environment' }
        },
        decoder: {
          readers: [
            'code_128_reader',
            'ean_reader',
            'ean_8_reader',
            'upc_reader',
            'upc_e_reader',
            'code_39_reader',
            'code_93_reader',
            'codabar_reader',
            'i2of5_reader'
          ]
        },
        locate: true
      }, function (err) {
        if (err) {
          setStatus('Camera error: ' + (err.message || err), true);
          return;
        }
        Quagga.start();
        Quagga.onDetected(onDetected);
        running = true;
        setStatus('Scanning 1D barcodes…', false);
        toggleBtn.textContent = 'Stop scanner';
      });
    }

    function stopScanner() {
      if (!running) return;
      Quagga.offDetected(onDetected);
      Quagga.stop();
      running = false;
      setStatus('Scanner stopped.', false);
      toggleBtn.textContent = 'Start scanner';
    }

    toggleBtn.addEventListener('click', function () {
      if (running) stopScanner();
      else startScanner();
    });

    startScanner();
  </script>
</body>
</html>
